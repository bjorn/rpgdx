services:
  web:
    build:
      context: .
      dockerfile: docker/apache/Dockerfile
    ports:
      - "8080:80"
    environment:
      PHPBB_ALLOW_INSTALL_DIRS: "1"
    volumes:
      - ./:/var/www/html:delegated
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:11.7
    environment:
      MARIADB_ROOT_PASSWORD: rpgdx_root
      MARIADB_DATABASE: indierp_main
      MARIADB_USER: username
      MARIADB_PASSWORD: password
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
